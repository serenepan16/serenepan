<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serene Pan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    background:#0a0a0a;
    color:#f0f0f0;
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 0;
  }

  .page {
    width:min(100vw,480px);
    padding:56px 40px 48px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* Avatar */
  .avatar {
    width:100px; height:100px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid #c9a96e;
    cursor:zoom-in;
    margin-bottom:28px;
    transition:opacity 0.2s;
  }
  .avatar:hover { opacity:0.85; }
  .avatar img { width:100%; height:100%; object-fit:cover; object-position:center 5%; }

  /* Name */
  h1 {
    font-family:'Playfair Display',serif;
    font-size:2.4rem;
    font-weight:400;
    letter-spacing:0.04em;
    color:#ffffff;
    margin-bottom:8px;
    text-align:center;
  }

  /* Tagline */
  .tagline {
    font-size:0.68rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:#c9a96e;
    margin-bottom:6px;
    text-align:center;
  }

  /* Location */
  .location {
    font-size:0.75rem;
    color:#666;
    letter-spacing:0.1em;
    margin-bottom:48px;
    text-align:center;
  }

  /* Divider */
  .divider {
    width:1px;
    height:40px;
    background:linear-gradient(to bottom, transparent, #c9a96e, transparent);
    margin-bottom:48px;
  }

  /* Links */
  .links {
    width:100%;
    display:flex;
    flex-direction:column;
    gap:0;
  }

  .link-btn {
    display:flex;
    align-items:center;
    gap:16px;
    padding:20px 0;
    border-bottom:1px solid #1e1e1e;
    text-decoration:none;
    color:#f0f0f0;
    transition:all 0.2s ease;
    position:relative;
  }
  .link-btn:first-child { border-top:1px solid #1e1e1e; }
  .link-btn:hover { padding-left:8px; }
  .link-btn:hover .btn-label strong { color:#c9a96e; }

  /* Icon circle */
  .btn-icon {
    width:40px; height:40px;
    border-radius:50%;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .btn-icon svg { width:40px; height:40px; }

  .btn-label { flex:1; }
  .btn-label strong {
    display:block;
    font-size:0.95rem;
    font-weight:500;
    letter-spacing:0.02em;
    color:#f0f0f0;
    transition:color 0.2s;
  }
  .btn-label span {
    font-size:0.72rem;
    color:#555;
    letter-spacing:0.04em;
  }

  .btn-arrow {
    color:#333;
    font-size:1.1rem;
    transition:all 0.2s;
  }
  .link-btn:hover .btn-arrow {
    color:#c9a96e;
    transform:translateX(4px);
  }

  /* Footer */
  .footer {
    margin-top:48px;
    font-size:0.6rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:#2a2a2a;
    text-align:center;
  }

  /* Lightbox */
  .lightbox {
    display:none;
    position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,0.95);
    align-items:center; justify-content:center;
  }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:88vw; max-height:88vh; border-radius:4px; border:1px solid #c9a96e; }
  .lightbox-close {
    position:absolute; top:24px; right:28px;
    color:#c9a96e; font-size:1.8rem;
    cursor:pointer; user-select:none;
    font-family:'Inter',sans-serif; font-weight:300;
  }
</style>
</head>
